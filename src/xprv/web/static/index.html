<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;

  --line:rgba(255,255,255,.12);
  --line-strong:rgba(196,255,230,.28);
  --text:#f2f4f2;
  --muted:#8a928c;
  --soft:#5e6761;
  --accent:#9af0cb;
  --accent-2:#5ed18c;
  --danger:#d85d5d;
  --title-font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --title-size:clamp(2.9rem,7vw,4.8rem);
  --title-weight:280;
  --title-spacing:.18em;
  --title-indent:.18em;
  --input-font:ui-monospace,SFMono-Regular,Menlo,Monaco,"Cascadia Mono","Segoe UI Mono",monospace;
}
html,body{min-height:100vh;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}

canvas#globe{position:fixed;inset:0;z-index:0;pointer-events:none}

body{display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:2rem;position:relative;z-index:1;padding:2rem 1rem}
.hero{
  width:min(760px,92vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.8rem;
  position:relative;
  z-index:2;
  animation:hero-in .7s ease-out both;
}
.hero > .title-wrap{order:1}
.hero > .search-shell{order:2}
.hero > #details{order:3}
.hero > .status{order:4}
.title-wrap{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
h1{
  font-family:var(--title-font);
  font-size:var(--title-size);
  font-weight:var(--title-weight);
  letter-spacing:var(--title-spacing);
  text-indent:var(--title-indent);
  text-shadow:0 0 40px rgba(255,255,255,0.08);
}
.search-shell{
  width:100%;
  max-width:660px;
  padding:.82rem;
  border:1px solid rgba(255,255,255,.11);
  border-radius:26px;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)), var(--panel);
  backdrop-filter:blur(10px);
  box-shadow:0 28px 90px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.04);
  transition:border-color .25s, box-shadow .25s, transform .25s;
}
.search-shell:focus-within{
  border-color:var(--line-strong);
  box-shadow:0 28px 96px rgba(0,0,0,.56), 0 0 0 1px rgba(154,240,203,.1), 0 0 36px rgba(94,209,140,.08);
  transform:translateY(-1px);
}
.search{width:100%;position:relative}
.clear,.paste{position:absolute;right:0;top:0;bottom:0;
color:#869089;cursor:pointer;background:none;border:none;border-left:1px solid rgba(255,255,255,.08);display:none}
.clear{width:2.5rem;font-size:1.4rem}
.paste{
  width:4.1rem;
  font-size:.72rem;
  font-family:monospace;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#b5c9bb;
  background:linear-gradient(180deg, rgba(154,240,203,.08), rgba(94,209,140,.02));
}
.clear:hover,.paste:hover{color:#fff;background:rgba(255,255,255,0.06)}
input:not(:placeholder-shown) ~ .clear{display:block}
input:placeholder-shown ~ .paste{display:block}
input{
  width:100%;
  padding:1rem 4.2rem 1rem 1rem;
  font-size:1rem;
  font-family:var(--input-font);
  background:var(--panel-strong);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
  border-radius:10px;
  outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
  backdrop-filter:blur(4px);
}
input::placeholder{color:#58615c}
input:focus{
  border-color:rgba(154,240,203,.38);
  box-shadow:0 0 0 1px rgba(154,240,203,.12), 0 0 28px rgba(154,240,203,.08);
  background:rgba(20,20,20,.92);
}
input.valid{border-color:rgba(94,209,140,.62);box-shadow:0 0 0 1px rgba(94,209,140,.15)}
input.invalid{border-color:rgba(216,93,93,.65);box-shadow:0 0 0 1px rgba(216,93,93,.12)}
.status{
  font-size:.84rem;
  color:#6d756f;
  min-height:1.35em;
  text-align:center;
  padding:.35rem .95rem;
  border-radius:999px;
  max-width:min(680px,92vw);
}
.status:not(:empty){
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(4px);
}
footer{
  position:fixed;
  bottom:1.05rem;
  font-size:.74rem;
  color:#4e5550;
  text-align:center;
  z-index:2;
  animation:hero-in .9s ease-out both;
}
footer a{color:#838d86;text-decoration:none}
footer a:hover{color:#b9efcf;text-decoration:none}
.status.error{color:#f07b7b}
.status.working{color:#e3bb62}
.status.done{color:#8fe0ac}

body.variant-stack{}
body.variant-below{
  --title-font:ui-monospace,SFMono-Regular,Menlo,Monaco,"Cascadia Mono","Segoe UI Mono",monospace;
  --title-size:clamp(2rem,4.8vw,3.1rem);
  --title-weight:400;
  --title-spacing:.22em;
  --title-indent:.22em;
}
body.variant-below .hero{gap:.55rem}
body.variant-below .title-wrap{order:2}
body.variant-below .search-shell{order:1}
body.variant-below h1{opacity:.9}

body.variant-mono{
  --title-font:ui-monospace,SFMono-Regular,Menlo,Monaco,"Cascadia Mono","Segoe UI Mono",monospace;
  --title-size:clamp(2.65rem,6.1vw,4.15rem);
  --title-weight:400;
  --title-spacing:.14em;
  --title-indent:.14em;
}
body.variant-mono .hero{gap:.65rem}
body.variant-mono .search-shell{max-width:700px}
body.variant-mono input::placeholder{letter-spacing:.04em}

body.variant-side{
  --title-font:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --title-size:clamp(2.7rem,5.8vw,4.6rem);
  --title-weight:400;
  --title-spacing:.06em;
  --title-indent:.06em;
}
body.variant-side .hero{
  width:min(980px,94vw);
  flex-direction:row;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-end;
  gap:1.25rem 1.5rem;
}
body.variant-side .title-wrap{
  width:auto;
  flex:0 0 auto;
  justify-content:flex-end;
}
body.variant-side .search-shell{
  flex:1 1 520px;
  max-width:none;
}
body.variant-side #details,
body.variant-side .status{
  width:100%;
}

#details{margin-top:.1rem;opacity:0;transform:translateY(4px);transition:opacity .35s,transform .35s;
font-size:.8rem;color:#9ca39d;font-family:monospace;
display:flex;align-items:center;gap:0;flex-wrap:wrap;justify-content:center;
background:rgba(0,0,0,0.56);border:1px solid rgba(255,255,255,.06);border-radius:999px;padding:.45rem .9rem;
backdrop-filter:blur(6px);max-width:min(680px,92vw)}
#details.show{opacity:1;transform:translateY(0)}
#details .sep{color:#38413c;margin:0 .6rem}
@media(max-width:500px){
  #details{flex-direction:column;gap:.2rem;padding:.5rem .8rem}
  #details .sep{display:none}
  .hero{gap:.7rem}
  .search-shell{padding:.62rem;border-radius:20px}
  input{padding:.95rem 4.1rem .95rem .95rem;font-size:.96rem}
  #variant-dock{
    right:.75rem;
    bottom:.8rem;
    padding:.3rem;
    gap:.28rem;
  }
  #variant-dock button{
    padding:.42rem .6rem;
    font-size:.6rem;
  }
}
@media(max-width:900px){
  body.variant-side .hero{
    width:min(760px,92vw);
    flex-direction:column;
    align-items:center;
    gap:.8rem;
  }
  body.variant-side .title-wrap,
  body.variant-side .search-shell{
    width:100%;
    flex:auto;
  }
}
#details a{color:#8fd6a9;text-decoration:none;cursor:pointer}
#details a:hover{text-decoration:none;color:#c2f4d2}
#details .steps{cursor:pointer;color:#a8e2bd}
#details .steps:hover{color:#d0f8dc}
#details .icon{cursor:pointer;opacity:.5;margin-left:.3rem;font-size:.9em}
#details .icon:hover{opacity:1}

#variant-dock{
  position:fixed;
  right:1rem;
  bottom:1rem;
  z-index:7;
  display:none;
  gap:.35rem;
  padding:.35rem;
  border:1px solid rgba(255,255,255,.09);
  border-radius:999px;
  background:rgba(0,0,0,.62);
  backdrop-filter:blur(10px);
  box-shadow:0 18px 50px rgba(0,0,0,.4);
}
#variant-dock button{
  appearance:none;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.02);
  color:#7f8982;
  font:600 .64rem/1 ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;
  letter-spacing:.08em;
  text-transform:uppercase;
  border-radius:999px;
  padding:.48rem .7rem;
  cursor:pointer;
  transition:background .2s,color .2s,border-color .2s,transform .2s;
}
#variant-dock button:hover{
  color:#dce5de;
  border-color:rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  transform:translateY(-1px);
}
#variant-dock button.active{
  color:#d9f2e3;
  border-color:rgba(154,240,203,.22);
  background:rgba(154,240,203,.1);
}
#variant-dock button.font-cycle{
  min-width:8rem;
  text-align:center;
}

#modal{display:none;position:fixed;inset:0;z-index:10;
background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
align-items:center;justify-content:center;padding:2rem}
#modal.show{display:flex}
#modal-inner{background:#111;border:1px solid #333;border-radius:8px;
width:min(1000px,92vw);height:85vh;display:flex;flex-direction:column;
font-family:monospace;font-size:.8rem;line-height:1.6;color:#ccc;
position:relative}
#modal-header{padding:1rem 2rem;border-bottom:1px solid #333;flex-shrink:0}
#modal-header h3{color:#fff;font-size:1rem;margin:0;font-family:sans-serif}
#modal-body{flex:1;overflow-y:auto;padding:1rem 2rem}
#modal-footer{padding:.6rem 2rem;border-top:1px solid #333;font-size:.75rem;color:#666;text-align:center;flex-shrink:0}
#modal-footer a{color:#5b5;text-decoration:none}
#modal-footer a:hover{color:#7d7;text-decoration:underline}
#modal-footer span.act{cursor:pointer;color:#696}
#modal-footer .msep{color:#333;margin:0 .6rem}
#modal-close{position:absolute;top:.8rem;right:1rem;color:#666;cursor:pointer;
font-size:1.2rem;background:none;border:none;z-index:1}
#modal-close:hover{color:#fff}
.step-block{margin-bottom:1rem;padding:.6rem;border-left:2px solid #333;padding-left:.8rem}
.step-block.anchor{border-color:#5b5}
.step-block.header{border-color:#58c}
.step-block.map{border-color:#c85;margin-left:.6rem}
.step-type{font-weight:bold;margin-bottom:.4rem;font-size:.85rem}
.step-type.anchor{color:#5b5}
.step-type.header{color:#58c}
.step-type.map{color:#c85}
.step-detail{color:#999;font-size:.75rem;line-height:1.8}
.step-detail .k{color:#7bb}
.step-detail .v{color:#bda}
.step-detail .h{color:#686;font-size:.7rem}
.step-detail .n{color:#db8}
.step-detail .sep{color:#444;margin:0 .2rem}
.step-detail .link-badge{display:inline-flex;align-items:center;justify-content:center;

.step-detail .link-anchor{color:#f80;font-weight:bold}
.step-detail .link-tx{color:#e66}
.step-detail .link-state{color:#6af}
.step-detail .leaf-data{margin-top:.4rem;padding:.4rem .6rem;
border-left:1px solid #333;margin-left:.2rem;background:rgba(255,255,255,0.02);border-radius:0 4px 4px 0}

.step-skeleton{margin-bottom:1rem;padding:.6rem .8rem;border-left:2px solid #333;
animation:sk-pulse 1.5s ease-in-out infinite}
.step-skeleton .sk-label{font-size:.85rem;font-weight:bold;color:#444;margin-bottom:.5rem}
#sk-elapsed{font-weight:normal;color:#555;font-size:.7rem}
.step-skeleton .sk-bar{height:.55rem;border-radius:3px;background:rgba(255,255,255,0.05);margin-bottom:.4rem}
.step-skeleton .sk-bar:nth-child(2){width:70%}
.step-skeleton .sk-bar:nth-child(3){width:50%}
@keyframes sk-pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes hero-in{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

.step-block{position:relative}
.step-time{position:absolute;top:.4rem;right:.4rem;font-size:.65rem;color:#555;font-family:monospace}
</style>

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
// Smooth mouse tracking — lerp toward target to avoid glitchy snaps
let targetX = 0.5, targetY = 0.5;
document.addEventListener('mousemove', e => {
  targetX = e.clientX / window.innerWidth;
  targetY = e.clientY / window.innerHeight;
});

function populateGlobe(jsonStr) {
  const lines = jsonStr.split('\n').filter(l => l.trim());
  charGrid = lines.map(line => {
    const chars = [];
    const keyRe = /"([^"]+)"\s*:/g;
    const keyRanges = [];
    let m;
    while ((m = keyRe.exec(line)) !== null) {
      keyRanges.push([m.index + 1, m.index + 1 + m[1].length]);
    }
    for (let i = 0; i < line.length; i++) {
      const isKey = keyRanges.some(([s, e]) => i >= s && i < e);
      chars.push({ ch: line[i], isKey });
    }
    return chars;
  });
}

function drawGlobe() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!charGrid.length) { requestAnimationFrame(drawGlobe); return; }

  // Smooth lerp toward mouse target (0.03 = slow drift, avoids snap on flyover)
  mouseX += (targetX - mouseX) * 0.03;
  mouseY += (targetY - mouseY) * 0.03;

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const mobile = window.innerWidth < 600;

  if (mobile) {
    // Mobile: slow scrolling JSON text, filling screen width
    const w = canvas.width, h = canvas.height;
    const totalLines = charGrid.length;
    if (!totalLines) { rotation += 0.001; requestAnimationFrame(drawGlobe); return; }
    const sz = 11; // CSS pixels — canvas handles DPR via resize()
    const lineH = 15;
    const scrollY = rotation * 150;

    // Measure actual char width
    ctx.font = `${sz}px monospace`;
    const charW = ctx.measureText('M').width;
    const charsPerRow = Math.floor(w / charW);

    // Build wrapped rows from charGrid
    const visRows = Math.ceil(h / lineH) + 4;
    const startRow = Math.floor(scrollY / lineH);
    const yOffset = -(scrollY % lineH);

    for (let row = 0; row < visRows; row++) {
      // Cycle through charGrid, wrapping long lines across multiple rows
      const srcLine = (startRow + row) % totalLines;
      const parsed = charGrid[srcLine];
      if (!parsed.length) continue;

      const y = row * lineH + yOffset;
      const edgeFade = Math.min(Math.max(y, 0) / (lineH * 4), Math.max(h - y, 0) / (lineH * 4), 1);
      if (edgeFade <= 0) continue;

      for (let j = 0; j < charsPerRow && j < parsed.length; j++) {
        const { ch, isKey } = parsed[j];
        if (isKey) {
          ctx.font = `bold ${sz}px monospace`;
          ctx.fillStyle = `rgba(120,255,230,${0.2 * edgeFade})`;
        } else {
          ctx.font = `${sz}px monospace`;
          ctx.fillStyle = `rgba(30,160,50,${0.08 * edgeFade})`;
        }
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(ch, j * charW, y);
      }
    }
    rotation += 0.001;
    requestAnimationFrame(drawGlobe);
    return;
  }

  // Desktop: 3D globe — font sizes scale with viewport
  const vw = window.innerWidth;
  const baseKey = Math.max(8, vw * 0.007);    // ~9px at 1280, ~11px at 1600
  const baseVal = Math.max(6, vw * 0.005);    // ~6px at 1280, ~8px at 1600
  const r = Math.min(cx, cy) * 0.85;
  const tiltX = (mouseY - 0.5) * 0.5;
  const tiltY = (mouseX - 0.5) * 0.7;
  const cosX = Math.cos(tiltX), sinX = Math.sin(tiltX);
  const cosY = Math.cos(tiltY), sinY = Math.sin(tiltY);

  const totalLines = charGrid.length;
  const latLines = Math.min(totalLines, 80);
  const latSpread = 0.9;

  for (let i = 0; i < latLines; i++) {
    const lineIdx = i % totalLines;
    const parsed = charGrid[lineIdx];
    if (!parsed.length) continue;

    const ring = i % 2 === 0 ? i / 2 : -(i + 1) / 2;
    const lat = (ring / latLines) * Math.PI * latSpread;
    const cosLat = Math.cos(lat);
    const sinLat = Math.sin(lat);

    const charsToShow = Math.min(parsed.length, 100);
    for (let j = 0; j < charsToShow; j++) {
      const lon = -(j / charsToShow) * Math.PI * 2 + rotation + i * 0.03;

      let x = cosLat * Math.cos(lon);
      let z = cosLat * Math.sin(lon);
      let y = sinLat;

      const y2 = y * cosX - z * sinX;
      const z2 = y * sinX + z * cosX;
      const x2 = x * cosY - z2 * sinY;
      const z3 = x * sinY + z2 * cosY;

      if (z3 < -0.05) continue;

      const scale = 1 / (1 + z3 * 0.3);
      const sx = cx + x2 * r * scale;
      const sy = cy + y2 * r * scale;
      const depth = (z3 + 1) / 2;

      const { ch, isKey } = parsed[j];

      if (isKey) {
        const alpha = 0.15 + depth * depth * 0.55;
        const sz = Math.round((baseKey + depth * 4) * scale);
        ctx.font = `bold ${sz}px monospace`;
        ctx.fillStyle = `rgba(120,255,230,${alpha})`;
      } else {
        const alpha = 0.03 + depth * depth * 0.18;
        const green = Math.floor(130 + depth * 90);
        const sz = Math.round((baseVal + depth * 2) * scale);
        ctx.font = `${sz}px monospace`;
        ctx.fillStyle = `rgba(30,${green},50,${alpha})`;
      }

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ch, sx, sy);
    }
  }

  rotation += 0.002;
  requestAnimationFrame(drawGlobe);
}
drawGlobe();

function normalizeTxCandidate(raw, { extract = false } = {}) {
  const compact = raw.trim().replace(/\s+/g, '').replace(/^0x/i, '');
  if (!extract) return compact;
  const match = compact.match(/[0-9a-fA-F]{64}/);
  return match ? match[0] : compact;
}

async function doPaste() {
  try {
    const clip = await navigator.clipboard.readText();
    if (clip) {
      tx.value = normalizeTxCandidate(clip, { extract: true });
      tx.dispatchEvent(new Event('input'));
    }
  } catch(e) {}
}

tx.addEventListener('paste', (e) => {
  const clip = e.clipboardData?.getData('text');
  if (!clip) return;
  e.preventDefault();
  tx.value = normalizeTxCandidate(clip, { extract: true });
  tx.dispatchEvent(new Event('input'));
});

tx.addEventListener('input', () => {
  const v = tx.value.trim();
  tx.classList.remove('valid', 'invalid');
  statusEl.className = 'status';
  statusEl.textContent = '';
  details.className = '';
  details.innerHTML = '';

  if (!v) {
    closeModal();
    return;
  }
  if (!HEX_ONLY.test(v)) {
    tx.classList.add('invalid');
    statusEl.classList.add('error');
    statusEl.textContent = 'hex only: 0-9, a-f';
    return;
  }
  if (v.length < 64) {
    statusEl.textContent = `${v.length}/64 characters`;
    return;
  }
  if (v.length > 64) {
    tx.classList.add('invalid');
    statusEl.classList.add('error');
    statusEl.textContent = 'too long for transaction hash';
    return;
  }
  if (!HEX64.test(v)) return;

  tx.classList.add('valid');
  prove(v);
});

// ── Ledger header hashing (SHA512-Half) ───────────────────────
async function hashHeader(hdr) {
  // prefix "LWR\0" + ledger_index(4) + total_coins(8) + 3×hash(32)
  //        + parent_close_time(4) + close_time(4) + resolution(1) + flags(1)
  const prefix = new Uint8Array([0x4C, 0x57, 0x52, 0x00]);
  const full = new Uint8Array(4 + 4 + 8 + 32 + 32 + 32 + 4 + 4 + 1 + 1);
  full.set(prefix, 0);

  const dv = new DataView(full.buffer);
  let off = 4;
  dv.setUint32(off, hdr.ledger_index); off += 4;
  // total_coins as uint64
  dv.setBigUint64(off, BigInt(hdr.total_coins)); off += 8;
  // 32-byte hashes
  for (const field of ['parent_hash', 'transaction_hash', 'account_hash']) {
    const bytes = hexToBytes(hdr[field]);
    full.set(bytes, off); off += 32;
  }
  dv.setUint32(off, hdr.parent_close_time); off += 4;
  dv.setUint32(off, hdr.close_time); off += 4;
  full[off++] = hdr.close_time_resolution;
  full[off++] = hdr.close_flags;

  const digest = await crypto.subtle.digest('SHA-512', full.slice(0, off));
  // SHA512-Half: first 32 bytes
  return bytesToHex(new Uint8Array(digest).slice(0, 32)).toUpperCase();
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2)
    bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}

function bytesToHex(bytes) {
  return Array.from(bytes, b => b.toString(16).padStart(2, '0')).join('');
}

const RIPPLE_EPOCH = 946684800;
// Short skip list key: SHA512Half(be16(0x73)) — precomputed
// Same as xprv::skip_list_key() in C++
let SHORT_SKIP_KEY = '';
(async () => {
  const buf = new Uint8Array([0x00, 0x73]);
  const digest = await crypto.subtle.digest('SHA-512', buf);
  SHORT_SKIP_KEY = bytesToHex(new Uint8Array(digest).slice(0, 32)).toUpperCase();
})();
const rippleTime = (t) => {
  if (!t) return '';
  const d = new Date((t + RIPPLE_EPOCH) * 1000);
  const s = d.toISOString().replace('T',' ').replace(/:\d{2}\.\d+Z/,' UTC');
  return `<span class="h">${s}</span>`;
};
const kv = (k, v) => `<span class="k">${k}:</span> <span class="v">${v}</span>`;
const hx = (v, n=20) => `<span class="h">${v.substring(0, n)}\u2026</span>`;
const num = (v) => `<span class="n">${typeof v === 'number' ? v.toLocaleString() : v}</span>`;
const sep = () => `<span class="sep">\u2502</span> `;

function findTrieLeaf(node) {
  if (Array.isArray(node)) return node;
  if (node && typeof node === 'object') {
    for (const v of Object.values(node)) {
      const r = findTrieLeaf(v);
      if (r) return r;
    }
  }
  return null;
}

function countTrieNodes(node) {
  if (typeof node === 'string') return {inners:0,leaves:0,placeholders:1};
  if (Array.isArray(node)) return {inners:0,leaves:1,placeholders:0};
  if (node && typeof node === 'object') {
    let s = {inners:1,leaves:0,placeholders:0};
    for (const [k,v] of Object.entries(node)) {
      if (k.length === 1) { const c = countTrieNodes(v); s.inners+=c.inners; s.leaves+=c.leaves; s.placeholders+=c.placeholders; }
    }
    return s;
  }
  return {inners:0,leaves:0,placeholders:0};
}

let linkNum = 0;
const lnk = (cls, hash, label) => {
  const n = Math.floor(linkNum / 2) + 1;
  linkNum++;
  const badge = `<span class="link-badge">${n}</span>`;
  const tag = label ? ` \u2192 ${label}` : '';
  return `${badge}<span class="${cls}">${hash}</span>${tag}`;
};

async function describeStep(step, i, allSteps) {
  const type = step.type || 'unknown';
  const cls = type === 'anchor' ? 'anchor' : type === 'ledger_header' ? 'header' : 'map';
  let lines = [];

  if (type === 'anchor') {
    const nv = Object.keys(step.validations || {}).length;
    // Decode UNL blob to get real validator count
    let unlSize = nv;
    try {
      const blobHex = step.unl?.blob || '';
      if (blobHex) {
        const blobStr = blobHex.match(/.{1,2}/g).map(b => String.fromCharCode(parseInt(b, 16))).join('');
        unlSize = (JSON.parse(blobStr).validators || []).length;
      }
    } catch(e) {}
    lines.push(kv('ledger', `#${num(step.ledger_index)} ${sep()}${lnk('link-anchor', step.ledger_hash.substring(0,24)+'\u2026', 'header')}`));
    lines.push(kv('quorum', `${num(nv)}/${num(unlSize)} UNL validators ${sep()}${hx(step.unl?.public_key || '', 16)}`));
  } else if (type === 'ledger_header') {
    const h = step.header || {};
    const computed = await hashHeader(h);
    const ts = rippleTime(h.close_time);
    // Check if this header was reached via a skip list (preceding map_proof with Hashes)
    let skipInfo = '';
    for (let j = i - 1; j >= 0; j--) {
      if (allSteps[j].type === 'ledger_header') {
        const prevH = allSteps[j].header;
        const skippedLedgers = prevH.ledger_index - h.ledger_index;
        if (skippedLedgers > 0) {
          const skippedSecs = prevH.close_time - h.close_time;
          let timeStr;
          if (skippedSecs >= 86400) timeStr = `${(skippedSecs / 86400).toFixed(1)}d`;
          else if (skippedSecs >= 3600) timeStr = `${(skippedSecs / 3600).toFixed(1)}h`;
          else if (skippedSecs >= 60) timeStr = `${Math.round(skippedSecs / 60)}m`;
          else timeStr = `${skippedSecs}s`;
          skipInfo = ` ${sep()}<span class="h">\u0394 ${skippedLedgers.toLocaleString()} ledgers / ${timeStr}</span>`;
        }
        break;
      }
    }
    lines.push(kv('ledger', `#${num(h.ledger_index)}${skipInfo} ${sep()}${ts} ${sep()}${lnk('link-anchor', computed.substring(0,24)+'\u2026')}`));
    // Find what comes next to label the links
    let nextIsState = false, nextIsTx = false;
    for (let j = i + 1; j < allSteps.length; j++) {
      if (allSteps[j].type === 'map_proof') {
        if (allSteps[j].tree === 'tx') nextIsTx = true;
        else nextIsState = true;
        break;
      }
    }
    if (nextIsTx) {
      lines.push(kv('transaction_hash', lnk('link-tx', (h.transaction_hash||'').substring(0,24)+'\u2026', 'tx tree')));
    }
    if (nextIsState) {
      lines.push(kv('account_hash', lnk('link-state', (h.account_hash||'').substring(0,24)+'\u2026', 'state tree')));
    }
  } else if (type === 'map_proof') {
    const tree = step.tree || '?';
    const trie = step.trie;
    const isTx = tree === 'tx';
    const linkCls = isTx ? 'link-tx' : 'link-state';
    // Find preceding header to show what hash this root must match
    let rootHash = '';
    for (let j = i - 1; j >= 0; j--) {
      if (allSteps[j].type === 'ledger_header') {
        const hdr = allSteps[j].header;
        rootHash = isTx ? hdr.transaction_hash : hdr.account_hash;
        break;
      }
    }
    const treeName = isTx ? 'transactions' : 'account_state';
    lines.push(kv(treeName, rootHash ? lnk(linkCls, rootHash.substring(0,24)+'\u2026') : ''));

    if (trie) {
      const stats = countTrieNodes(trie);
      lines.push(kv('nodes', `${num(stats.inners)} inners ${sep()}${num(stats.leaves)} leaves ${sep()}${num(stats.placeholders)} placeholders`));

      const leaf = findTrieLeaf(trie);
      if (leaf && leaf.length >= 2 && typeof leaf[1] === 'object') {
        const data = leaf[1];
        const sub = [];
        if (data.LedgerEntryType === 'LedgerHashes' && data.Hashes) {
          // Determine range from preceding header
          let prevSeq = 0;
          for (let j = i - 1; j >= 0; j--) {
            if (allSteps[j].type === 'ledger_header') { prevSeq = allSteps[j].header.ledger_index; break; }
          }
          // Short vs long: compare leaf index to known short skip list key
          const leafIndex = leaf[0] || '';
          const isShort = leafIndex.toUpperCase() === SHORT_SKIP_KEY;
          const h = data.Hashes.length;
          let desc;
          if (isShort && prevSeq) {
            desc = `prior ${num(h)} ledgers (#${num(prevSeq - h)} \u2013 #${num(prevSeq - 1)})`;
          } else if (prevSeq) {
            // Long list: each entry is a flag ledger (every 256th)
            desc = `${num(h)} flag ledgers (every 256th)`;
          } else {
            desc = `${num(h)} entries`;
          }
          sub.push(kv('LedgerEntryType: LedgerHashes', desc));
        } else if (data.LedgerEntryType) {
          sub.push(kv('LedgerEntryType', `<span class="v">${data.LedgerEntryType}</span>`));
        }
        if (data.Hashes) {
          const hashes = data.Hashes;
          let targetHash = null;
          for (let j = i + 1; j < allSteps.length; j++) {
            if (allSteps[j].type === 'ledger_header') {
              targetHash = await hashHeader(allSteps[j].header);
              break;
            }
          }
          let matchIdx = -1;
          if (targetHash) {
            matchIdx = hashes.findIndex(h => h.toUpperCase() === targetHash);
          }
          let show;
          if (matchIdx >= 0) {
            const matched = lnk('link-anchor', hashes[matchIdx].substring(0,24)+'\u2026', 'header');
            show = `\u2026${num(matchIdx)} before\u2026, ${matched}, \u2026${num(hashes.length - matchIdx - 1)} after\u2026`;
          } else {
            show = hashes.length <= 3
              ? hashes.map(x => hx(x, 12)).join(', ')
              : `${hx(hashes[0],12)}, \u2026${num(hashes.length - 2)} more\u2026, ${hx(hashes[hashes.length-1],12)}`;
          }
          sub.push(kv('Hashes', `[${show}] (${num(hashes.length)} total)`));
        }
        if (data.tx) {
          const tx = data.tx;
          if (tx.TransactionType) sub.push(kv('TransactionType', `<span class="v">${tx.TransactionType}</span>`));
          if (tx.Account) sub.push(kv('Account', `<span class="v">${tx.Account}</span>`));
          if (tx.Destination) sub.push(kv('Destination', `<span class="v">${tx.Destination}</span>`));
          if (tx.Amount) {
            let amt;
            if (typeof tx.Amount === 'string') {
              amt = (parseInt(tx.Amount) / 1e6).toFixed(6) + ' XRP';
            } else {
              let cur = tx.Amount.currency;
              if (cur && cur.length === 40) {
                cur = cur.match(/.{1,2}/g).map(b => {
                  const c = parseInt(b, 16); return c > 31 && c < 127 ? String.fromCharCode(c) : '';
                }).join('').replace(/\0+$/, '');
              }
              amt = tx.Amount.value + ' ' + cur;
            }
            sub.push(kv('Amount', `<span class="n">${amt}</span>`));
          }
        }
        if (data.meta?.TransactionResult) {
          sub.push(kv('result', `<span class="v">${data.meta.TransactionResult}</span>`));
        }
        if (sub.length) {
          lines.push(`<div class="leaf-data">${sub.join('<br>')}</div>`);
        }
      }
    }
  }

  return `<div class="step-block ${cls}"><div class="step-type ${cls}">${i + 1}. ${type}</div><div class="step-detail">${lines.join('<br>')}</div></div>`;
}

let skTimer = null;
function skeletonStep(n) {
  if (skTimer) clearInterval(skTimer);
  const html = `<div class="step-skeleton" id="sk-next"><div class="sk-label">${n}. \u2026 <span id="sk-elapsed"></span></div><div class="sk-bar"></div><div class="sk-bar"></div><div class="sk-bar"></div></div>`;
  // Start ticking after a microtask (element needs to be in DOM)
  const start = performance.now();
  skTimer = setInterval(() => {
    const el = document.getElementById('sk-elapsed');
    if (!el) { clearInterval(skTimer); skTimer = null; return; }
    const s = ((performance.now() - start) / 1000).toFixed(1);
    el.textContent = `${s}s`;
  }, 100);
  return html;
}

async function showSteps() {
  if (!lastProofJson) return;
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');
  const steps = lastProofJson.steps || [];
  linkNum = 0;
  const rendered = [];
  for (let i = 0; i < steps.length; i++) {
    rendered.push(await describeStep(steps[i], i, steps));
  }
  document.getElementById('modal-header').innerHTML = `<h3>Proof chain \u2014 ${steps.length} steps${idBadges(lastRid)}</h3>`;
  body.innerHTML = rendered.join('');
  if (lastDownloadUrl) {
    const binName = lastFilename.replace('.xprv.json', '.xprv.bin');
    footer.innerHTML = `<a href="${lastDownloadUrl}" download="${lastFilename}" title="${lastFilename}">json</a> <a href="/prove?tx=${tx.value}&format=bin" download="${binName}" style="color:#686;margin-left:.5rem" title="${binName}">bin</a> <span class="act" onclick="copyProof()" title="copy JSON" style="margin-left:.4rem">&#x1F4CB;</span><span class="msep">|</span><a href="/verify-xprv.py" style="color:#555">verify-xprv.py</a>`;
  } else {
    footer.innerHTML = '';
  }
  modal.className = 'show';
}

function closeModal() {
  document.getElementById('modal').className = '';
}
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal').onclick = (e) => {
  if (e.target.id === 'modal') closeModal();
};
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function finishProve(json, hash) {
  lastProvedHash = hash;
  showDetails(json, hash);
  populateGlobe(lastProofPretty);

  const anchor = (json.steps || []).find(s => s.type === 'anchor');
  const seq = anchor ? anchor.ledger_index : 'unknown';
  const filename = `proof-${seq}-${hash.substring(0, 12).toUpperCase()}.xprv.json`;

  const blob = new Blob([lastProofPretty], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  lastDownloadUrl = url;
  lastFilename = filename;

  statusEl.className = 'status done';
  const binFilename = filename.replace('.json', '.xprv.bin');
  statusEl.innerHTML = `<a href="${url}" download="${filename}" style="color:#2a2;text-decoration:none" title="${filename}">json</a> <a href="/prove?tx=${hash}&format=bin" download="${binFilename}" style="color:#686;text-decoration:none;margin-left:.5rem" title="${binFilename}">bin</a> <span onclick="copyProof()" title="copy JSON" style="cursor:pointer;color:#696;font-size:1em;margin-left:.4rem">&#x1F4CB;</span>`;
}

let activeSSE = null;

function showModalError(msg, hash) {
  const body = document.getElementById('modal-body');
  if (!body) return;
  const sk = document.getElementById('sk-next');
  if (sk) sk.remove();
  const div = document.createElement('div');
  div.style.cssText = 'margin-top:1rem;padding:.6rem;border-left:2px solid #e44;color:#e44;font-size:.8rem;display:flex;align-items:center;gap:.8rem';
  div.innerHTML = `<span style="flex:1">${msg}</span><button style="background:none;border:1px solid #666;color:#ccc;padding:.3rem .8rem;border-radius:4px;cursor:pointer;font-size:.75rem;font-family:monospace;white-space:nowrap" onmouseover="this.style.borderColor='#aaa'" onmouseout="this.style.borderColor='#666'">retry</button>`;
  div.querySelector('button').onclick = () => prove(hash);
  body.appendChild(div);
  body.parentElement.scrollTop = body.parentElement.scrollHeight;
}

function genRequestId() {
  const a = crypto.getRandomValues(new Uint8Array(4));
  return Array.from(a, b => b.toString(16).padStart(2,'0')).join('');
}

async function prove(hash) {
  if (activeSSE) { activeSSE.close(); activeSSE = null; }

  statusEl.className = 'status working';
  statusEl.textContent = 'proving\u2026';
  details.className = '';

  const rid = genRequestId();
  lastRid = rid;
  fetchServerInfo();

  // Open step modal immediately with skeleton placeholder
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  document.getElementById('modal-header').innerHTML = `<h3>Building proof\u2026 ${idBadges(rid)}</h3>`;
  body.innerHTML = skeletonStep(1);
  modal.className = 'show';
  linkNum = 0;
  const streamedSteps = [];
  let stepStartTime = performance.now();
  const stepTimes = [];  // elapsed ms per step

  return new Promise((resolve) => {
    const es = new EventSource(`/prove?tx=${hash}&xrid=${rid}`);
    activeSSE = es;
    const timeout = setTimeout(() => {
      es.close(); activeSSE = null;
      statusEl.className = 'status error';
      statusEl.textContent = 'timed out';
      showModalError('timed out', hash);
      resolve();
    }, 60000);

    es.onmessage = async (e) => {
      try {
        const msg = JSON.parse(e.data);

        if (msg.type === 'log') {
          // Rolling log console — max 5 lines, newest at bottom
          let logBox = document.getElementById('log-console');
          if (!logBox) {
            logBox = document.createElement('div');
            logBox.id = 'log-console';
            logBox.style.cssText = 'font-size:.6rem;color:#555;font-family:monospace;margin:.3rem 0;padding:.3rem .6rem;border-left:1px solid #2a2a2a;max-height:5.5em;overflow:hidden';
            const sk = document.getElementById('sk-next');
            if (sk) sk.parentElement.insertBefore(logBox, sk);
            else body.appendChild(logBox);
          }
          const line = document.createElement('div');
          line.style.cssText = 'padding:.05rem 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
          line.textContent = '\u203a ' + msg.msg;
          logBox.appendChild(line);
          // Cap at 5 lines
          while (logBox.children.length > 5)
            logBox.removeChild(logBox.firstChild);
          body.parentElement.scrollTop = body.parentElement.scrollHeight;
        }

        if (msg.type === 'step') {
          const now = performance.now();
          const elapsed = now - stepStartTime;
          stepTimes.push(elapsed);
          stepStartTime = now;

          streamedSteps.push(msg.step);
          statusEl.textContent = `proving\u2026 step ${msg.index + 1}`;
          // Remove log console + skeleton for this step
          const lc = document.getElementById('log-console');
          if (lc) lc.remove();
          const sk = document.getElementById('sk-next');
          if (sk) sk.remove();
          // Render step with timing badge
          const html = await describeStep(msg.step, msg.index, streamedSteps);
          const timeLabel = elapsed < 1000
            ? `${Math.round(elapsed)}ms`
            : `${(elapsed / 1000).toFixed(1)}s`;
          const timed = html.replace(
            '<div class="step-detail">',
            `<span class="step-time">${timeLabel}</span><div class="step-detail">`);
          body.insertAdjacentHTML('beforeend', timed);
          // Add next skeleton (unless this was a tx map_proof = final step)
          const isFinal = msg.step.type === 'map_proof' && msg.step.tree === 'tx';
          if (!isFinal) {
            body.insertAdjacentHTML('beforeend', skeletonStep(msg.index + 2));
          }
          // Auto-scroll to bottom
          body.parentElement.scrollTop = body.parentElement.scrollHeight;
        }

        if (msg.type === 'done') {
          clearTimeout(timeout);
          if (skTimer) { clearInterval(skTimer); skTimer = null; }
          es.close(); activeSSE = null;
          // Assemble proof from streamed steps
          const json = {
            network_id: msg.network_id || 0,
            steps: streamedSteps
          };
          finishProve(json, hash);
          // Re-render all steps with full context for correct links
          showSteps();
          resolve();
        }

        if (msg.type === 'error') {
          clearTimeout(timeout);
          es.close(); activeSSE = null;
          statusEl.className = 'status error';
          statusEl.textContent = msg.error;
          showModalError(msg.error, hash);
          resolve();
        }
      } catch(err) {
        // JSON parse error — ignore malformed event
      }
    };

    es.onerror = () => {
      clearTimeout(timeout);
      es.close(); activeSSE = null;
      const errMsg = streamedSteps.length ? 'connection lost' : 'failed to connect';
      statusEl.className = 'status error';
      statusEl.textContent = errMsg;
      showModalError(errMsg, hash);
      resolve();
    };
  });
}
