steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - src/xprv/deploy/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/xprv-server/xprv/xprv:latest
      - .
images:
  - us-central1-docker.pkg.dev/xprv-server/xprv/xprv:latest
timeout: 600s
options:
  machineType: E2_HIGHCPU_16
